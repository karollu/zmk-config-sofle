# Enable Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Support for display and rotation
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_ROTATION_0=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Bluetooth stability adjustments
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB underglow / backlight support
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# WPM (Words Per Minute) counter
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Battery reporting (needed for battery widget)
CONFIG_ZMK_BATTERY_REPORTING=y
